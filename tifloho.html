<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Floating house</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
		
        <style>
            html, body {height: 100%;}
            body {font-family: Arial;font-size:12px;background-color: #000;color: #fff;margin: 0px;overflow: hidden;}
			a img {-webkit-tap-highlight-color: transparent;transition: transform 0.15s ease, opacity 0.15s ease;}
			a img:active {transform: scale(0.96);opacity: 0.9;}
            #info {position: absolute;top: 10px;left: 20px;z-index: 100;display:block}
            #info2 {color: #fff;position: absolute;top: 45%;width: 100%;text-align: center;z-index: 100;display:block;}
            #pre {position: absolute; width: 600px; height: 360px; top:50%;left:50%;transform:translate(-50%,-50%);background-image: url('imagens/img7.jpg');background-repeat: no-repeat; z-index: 0;}
            .central{position: absolute;width:100%;z-index: 97;top: 50px;animation: hideAnim 0s ease-in 10s; animation-fill-mode:forwards;}
            @keyframes hideAnim {to{visibility:hidden;}}
            #escrita {margin: auto;border-radius: 10px;padding: 15px 10px; background-color: rgba(0,0,0,0.25); max-width:350px;}
            .btns {position: absolute;top: 20px;right: 50px;width: 140px;font-weight:bold;}
            .bt {width: 70px;box-shadow: 0px 0px 12px rgba(0,0,0,0.5);cursor: pointer;z-index: 99;}
            .rodapecw{position: absolute;bottom: 20px;left:20px;color:white;font-size:12px;font-family:Arial;margin:auto;width:100%;z-index: 99;}            
			.fechador {border:none;cursor: pointer;background-color: rgba(0,0,0,0.0);float:right;}
			button { font-weight:bold; width: 140px; outline:none; color: #11A; border: 0px;padding: 5px 10px;margin:5px 16px;border-radius: 6px;cursor: pointer; background-color:rgba(0,160,255,0.3)}
			button:hover {opacity:1;box-shadow: 0px 0px 12px rgba(255,255,255,0.75);}
        </style>
        <script src="purecookie.js"></script>
		<script src="Jscripts.js"></script>
	</head>
	<body onload="changeLanguageAM(detectUserLanguage())">

		<div id="container"></div>
        <div id="info">
            <a href="index.html"><img src="imagens/voltar.png"></a>
        </div>
		<div id="info2" >Loading...</div>
        <div class="central">
            <p id="escrita" data-i18n="trifloho_info">...</p>
        </div>
        <div class="btns">
			<button id="BtnF" data-i18n="trifloho_seeAll">Ver tudo</button>
            <button id="Btn0" data-i18n="trifloho_topDeck">Top deck</button>
            <button id="Btn1" data-i18n="trifloho_mainDeck">Main deck</button>
            <button id="Btn2" data-i18n="trifloho_lowerDeck">Lower deck</button>
            <button id="Btn3" data-i18n="trifloho_glassDoors">Glass doors</button>
        </div>
		<p class="rodapecw">© 2026 Joao P. • All rights reserved</p>        		
		<script src="./wp/flh.js"></script>
	</body>
</html>
